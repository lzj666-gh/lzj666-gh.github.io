    <div id="file-content">
        <div class="no-file-selected">
            <h2>йҖүжӢ©ж–Үд»¶жҹҘзңӢеҶ…е®№</h2>
            <p>д»Һе·Ұдҫ§еҲ—иЎЁдёӯйҖүжӢ©дёҖдёӘж–Үд»¶пјҢеҶ…е®№е°ҶжҳҫзӨәеңЁжӯӨеӨ„</p>

    <script>
        // еҪ“еүҚйҖүдёӯзҡ„ж–Үд»¶
        let currentFile = null;
        
        // еҠ иҪҪж–Үд»¶еҶ…е®№
        async function loadFile(filename) {
            // жӣҙж–°еҪ“еүҚйҖүдёӯзҡ„ж–Үд»¶
            currentFile = filename;
            
            // жӣҙж–°ж–Үд»¶еҲ—иЎЁзҡ„й«ҳдә®
            updateFileListHighlight(filename);
            
            // жҳҫзӨәеҠ иҪҪзҠ¶жҖҒ
            document.getElementById('file-content').innerHTML = '<div class="loading">жӯЈеңЁеҠ иҪҪж–Үд»¶еҶ…е®№...</div>';
            
            try {
                // иҺ·еҸ–ж–Үд»¶еҶ…е®№
                const response = await fetch(filename);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const fileContent = await response.text();
                
                // жҳҫзӨәж–Үд»¶еҶ…е®№
                displayFileContent(filename, fileContent);
            } catch (error) {
                console.error('еҠ иҪҪж–Үд»¶еӨұиҙҘ:', error);
                document.getElementById('file-content').innerHTML = `
                    <div class="error">
                        <strong>еҠ иҪҪж–Үд»¶еӨұиҙҘ</strong><br>
                        <small>${error.message}</small>
                    </div>
                `;
            }
        }
        
        // жӣҙж–°ж–Үд»¶еҲ—иЎЁй«ҳдә®
        function updateFileListHighlight(filename) {
            // з§»йҷӨжүҖжңүliе…ғзҙ зҡ„activeзұ»
            document.querySelectorAll('#file-list li').forEach(li => {
                li.classList.remove('active');
            });
            
            // дёәеҪ“еүҚйҖүдёӯзҡ„ж–Үд»¶ж·»еҠ activeзұ»
            const activeLi = document.querySelector(`#file-list li[data-filename="${filename}"]`);
            if (activeLi) {
                activeLi.classList.add('active');
            }
        }
        
        // жҳҫзӨәж–Үд»¶еҶ…е®№
        function displayFileContent(filename, content) {
            const displayName = filename.replace(/#/g, ' ');
            const fileSize = content.length;
            const fileExt = filename.split('.').pop().toUpperCase();
            
            // иҪ¬д№үHTMLзү№ж®Ҡеӯ—з¬Ұ
            const escapedContent = escapeHtml(content);
            
            const html = `
                <div class="file-header">
                    <div class="file-title">
                        ${displayName}
                        <span class="file-ext">${fileExt}</span>
                    </div>
                    <div class="file-info">
                        ${fileSize.toLocaleString()} еӯ—з¬Ұ
                    </div>
                </div>
                <div class="code-display">${escapedContent}</div>
            `;
            
            document.getElementById('file-content').innerHTML = html;
            
            // еҰӮжһңжҳҜд»Јз Ғж–Үд»¶пјҢеҸҜд»Ҙж·»еҠ иҜӯжі•й«ҳдә®пјҲеҸҜйҖүпјү
            highlightCodeIfNeeded(filename, content);
        }
        
        // иҪ¬д№үHTMLзү№ж®Ҡеӯ—з¬Ұ
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ж №жҚ®ж–Үд»¶зұ»еһӢиҝӣиЎҢиҜӯжі•й«ҳдә®пјҲеҹәзЎҖзүҲжң¬пјү
        function highlightCodeIfNeeded(filename, content) {
            const ext = filename.split('.').pop().toLowerCase();
            const codeDisplay = document.querySelector('.code-display');
            
            if (!codeDisplay) return;
            
            // з®ҖеҚ•зҡ„е…ій”®иҜҚй«ҳдә®пјҲеҸҜж №жҚ®йңҖиҰҒжү©еұ•пјү
            if (['py', 'python'].includes(ext)) {
                // PythonиҜӯжі•й«ҳдә®
                let highlighted = content.replace(
                    /((def|class|if|else|elif|for|while|return|import|from|as|try|except|finally|with|and|or|not|in|is|lambda|pass|break|continue))/g,
                    '<span style="color: #007bff; font-weight: bold;">$1</span>'
                );
                highlighted = highlighted.replace(
                    /((True|False|None))/g,
                    '<span style="color: #28a745;">$1</span>'
                );
                highlighted = highlighted.replace(
                    /(#.*)/g,
                    '<span style="color: #6c757d;">$1</span>'
                );
                codeDisplay.innerHTML = highlighted;
            }
            else if (['js', 'javascript'].includes(ext)) {
                // JavaScriptиҜӯжі•й«ҳдә®
                let highlighted = content.replace(
                    /((function|var|let|const|if|else|for|while|return|class|import|export|from|try|catch|finally|new|this|typeof|instanceof))/g,
                    '<span style="color: #007bff; font-weight: bold;">$1</span>'
                );
                highlighted = highlighted.replace(
                    /((true|false|null|undefined))/g,
                    '<span style="color: #28a745;">$1</span>'
                );
                highlighted = highlighted.replace(
                    /(\/\/.*)/g,
                    '<span style="color: #6c757d;">$1</span>'
                );
                codeDisplay.innerHTML = highlighted;
            }
            else if (['html', 'htm'].includes(ext)) {
                // HTMLиҜӯжі•й«ҳдә®
                let highlighted = content.replace(
                    /(&lt;\/?[a-zA-Z][^&gt;]*&gt;)/g,
                    '<span style="color: #dc3545;">$1</span>'
                );
                codeDisplay.innerHTML = highlighted;
            }
            // еҸҜд»Ҙж·»еҠ жӣҙеӨҡж–Үд»¶зұ»еһӢзҡ„ж”ҜжҢҒ
        }
        
        // йЎөйқўеҠ иҪҪе®ҢжҲҗеҗҺпјҢжЈҖжҹҘURLдёӯжҳҜеҗҰжңүж–Үд»¶еҸӮж•°
        window.addEventListener('DOMContentLoaded', () => {
            // д»ҺURLиҺ·еҸ–ж–Үд»¶еҸӮж•°
            const urlParams = new URLSearchParams(window.location.search);
            const fileParam = urlParams.get('file');
            
            if (fileParam) {
                // еҰӮжһңURLдёӯжңүfileеҸӮж•°пјҢиҮӘеҠЁеҠ иҪҪиҜҘж–Үд»¶
                loadFile(fileParam);
            }
        });
    </script>
