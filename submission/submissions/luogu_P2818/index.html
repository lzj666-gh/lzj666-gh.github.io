<body>
    <div id="file-list">
        <div class="file-list-title">жЦЗдїґеИЧи°®</div>
        <ul>
            <li data-filename="101614033.txt">
                <a class="file-link" onclick="loadFile('101614033.txt')">101614033.txt</a>
            </li>
            <li data-filename="101614065.txt">
                <a class="file-link" onclick="loadFile('101614065.txt')">101614065.txt</a>

            </li>
            <li data-filename="solution.md">
                <a class="file-link" onclick="loadFile('solution.md')">solution.md</a>
            </li>
            <li data-filename="е§©дљњзЪДиµЈи™У.md">
                <a class="file-link" onclick="loadFile('е§©дљњзЪДиµЈи™У.md')">е§©дљњзЪДиµЈи™У.md</a>
            </li>
        </ul>
        <a class="back-link" href="../index.html">ињФеЫЮдЄКзЇІзЫЃељХ</a>
    </div>
    
    <div id="file-content">
        <div class="no-file-selected">
            <h2>йАЙжЛ©жЦЗдїґжЯ•зЬЛеЖЕеЃє</h2>
            <p>дїОеЈ¶дЊІеИЧи°®дЄ≠йАЙжЛ©дЄАдЄ™жЦЗдїґпЉМеЖЕеЃєе∞ЖжШЊз§ЇеЬ®ж≠§е§Д</p>
        </div>
    </div>
    
    <script>
        // ељУеЙНйАЙдЄ≠зЪДжЦЗдїґ
        let currentFile = null;
        
        // еК†иљљжЦЗдїґеЖЕеЃє
        async function loadFile(filename) {
            // жЫіжЦ∞ељУеЙНйАЙдЄ≠зЪДжЦЗдїґ
            currentFile = filename;
            
            // жЫіжЦ∞жЦЗдїґеИЧи°®зЪДйЂШдЇЃ
            updateFileListHighlight(filename);
            
            // жШЊз§ЇеК†иљљзКґжАБ
            document.getElementById('file-content').innerHTML = '<div class="loading">ж≠£еЬ®еК†иљљжЦЗдїґеЖЕеЃє...</div>';
            
            try {
                // иОЈеПЦжЦЗдїґеЖЕеЃє
                const response = await fetch(filename);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const fileContent = await response.text();
                
                // жШЊз§ЇжЦЗдїґеЖЕеЃє
                displayFileContent(filename, fileContent);
            } catch (error) {
                console.error('еК†иљљжЦЗдїґе§±иі•:', error);
                document.getElementById('file-content').innerHTML = `
                    <div class="error">
                        <strong>еК†иљљжЦЗдїґе§±иі•</strong><br>
                        <small>${error.message}</small>
                    </div>
                `;
            }
        }
        
        // жЫіжЦ∞жЦЗдїґеИЧи°®йЂШдЇЃ
        function updateFileListHighlight(filename) {
            // зІїйЩ§жЙАжЬЙliеЕГзі†зЪДactiveз±ї
            document.querySelectorAll('#file-list li').forEach(li => {
                li.classList.remove('active');
            });
            
            // дЄЇељУеЙНйАЙдЄ≠зЪДжЦЗдїґжЈїеК†activeз±ї
            const activeLi = document.querySelector(`#file-list li[data-filename="${filename}"]`);
            if (activeLi) {
                activeLi.classList.add('active');
            }
        }
        
        // жШЊз§ЇжЦЗдїґеЖЕеЃє
        function displayFileContent(filename, content) {
            const displayName = filename.replace(/#/g, ' ');
            const fileSize = content.length;
            const fileExt = filename.split('.').pop().toUpperCase();
            
            // иљђдєЙHTMLзЙєжЃКе≠Чзђ¶
            const escapedContent = escapeHtml(content);
            
            const html = `
                <div class="file-header">
                    <div class="file-title">
                        ${displayName}
                        <span class="file-ext">${fileExt}</span>
                    </div>
                    <div class="file-info">
                        ${fileSize.toLocaleString()} е≠Чзђ¶
                    </div>
                </div>
                <div class="code-display">${escapedContent}</div>
            `;
            
            document.getElementById('file-content').innerHTML = html;
            
            // е¶ВжЮЬжШѓдї£з†БжЦЗдїґпЉМеПѓдї•жЈїеК†иѓ≠ж≥ХйЂШдЇЃпЉИеПѓйАЙпЉЙ
            highlightCodeIfNeeded(filename, content);
        }
        
        // иљђдєЙHTMLзЙєжЃКе≠Чзђ¶
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // ж†єжНЃжЦЗдїґз±їеЮЛињЫи°Миѓ≠ж≥ХйЂШдЇЃпЉИеЯЇз°АзЙИжЬђпЉЙ
        function highlightCodeIfNeeded(filename, content) {
            const ext = filename.split('.').pop().toLowerCase();
            const codeDisplay = document.querySelector('.code-display');
            
            if (!codeDisplay) return;
            
            // зЃАеНХзЪДеЕ≥йФЃиѓНйЂШдЇЃпЉИеПѓж†єжНЃйЬАи¶БжЙ©е±ХпЉЙ
            if (['py', 'python'].includes(ext)) {
                // Pythonиѓ≠ж≥ХйЂШдЇЃ
                let highlighted = content.replace(
                    /((def|class|if|else|elif|for|while|return|import|from|as|try|except|finally|with|and|or|not|in|is|lambda|pass|break|continue))/g,
                    '<span style="color: #007bff; font-weight: bold;">$1</span>'
                );
                highlighted = highlighted.replace(
                    /((True|False|None))/g,
                    '<span style="color: #28a745;">$1</span>'
                );
                highlighted = highlighted.replace(
                    /(#.*)/g,
                    '<span style="color: #6c757d;">$1</span>'
                );
                codeDisplay.innerHTML = highlighted;
            }
            else if (['js', 'javascript'].includes(ext)) {
                // JavaScriptиѓ≠ж≥ХйЂШдЇЃ
                let highlighted = content.replace(
                    /((function|var|let|const|if|else|for|while|return|class|import|export|from|try|catch|finally|new|this|typeof|instanceof))/g,
                    '<span style="color: #007bff; font-weight: bold;">$1</span>'
                );
                highlighted = highlighted.replace(
                    /((true|false|null|undefined))/g,
                    '<span style="color: #28a745;">$1</span>'
                );
                highlighted = highlighted.replace(
                    /(\/\/.*)/g,
                    '<span style="color: #6c757d;">$1</span>'
                );
                codeDisplay.innerHTML = highlighted;
            }
            else if (['html', 'htm'].includes(ext)) {
                // HTMLиѓ≠ж≥ХйЂШдЇЃ
                let highlighted = content.replace(
                    /(&lt;\/?[a-zA-Z][^&gt;]*&gt;)/g,
                    '<span style="color: #dc3545;">$1</span>'
                );
                codeDisplay.innerHTML = highlighted;
            }
            // еПѓдї•жЈїеК†жЫіе§ЪжЦЗдїґз±їеЮЛзЪДжФѓжМБ
        }
        
        // й°µйЭҐеК†иљљеЃМжИРеРОпЉМж£АжЯ•URLдЄ≠жШѓеР¶жЬЙжЦЗдїґеПВжХ∞
        window.addEventListener('DOMContentLoaded', () => {
            // дїОURLиОЈеПЦжЦЗдїґеПВжХ∞
            const urlParams = new URLSearchParams(window.location.search);
            const fileParam = urlParams.get('file');
            
            if (fileParam) {
                // е¶ВжЮЬURLдЄ≠жЬЙfileеПВжХ∞пЉМиЗ™еК®еК†иљљиѓ•жЦЗдїґ
                loadFile(fileParam);
            }
        });
    </script>
</body>
