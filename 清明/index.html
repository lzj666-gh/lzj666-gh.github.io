<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清明 · 云上追思</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #2b5a4c 0%, #1d3e34 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', '华文楷体', 'KaiTi', 'Microsoft YaHei', serif;
      padding: 16px;
      margin: 0;
    }

    /* 仿古卷轴主容器 —— 零成本，全凭氛围 */
    .scroll-container {
      width: 80%;
      background: #efe7d7;
      background-image: radial-gradient(circle at 25% 30%, rgba(215, 195, 160, 0.3) 2px, transparent 2px),
        radial-gradient(circle at 75% 70%, rgba(180, 150, 120, 0.2) 1px, transparent 2px);
      background-size: 40px 40px, 30px 30px;
      border-radius: 32px 32px 24px 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 2px #b99e7c inset, 0 0 0 5px #dac29c inset;
      padding: 32px 24px 40px 24px;
      position: relative;
      transition: all 0.2s ease;
    }

    /* 装饰挂轴 (左右两边的深色仿布) */
    .scroll-container::before,
    .scroll-container::after {
      content: '';
      position: absolute;
      top: 20px;
      bottom: 20px;
      width: 18px;
      background: #846d56;
      border-radius: 30px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4), inset -2px -2px 5px #4f3f30, inset 2px 2px 5px #bfa58b;
      z-index: 2;
    }

    .scroll-container::before {
      left: -6px;
    }

    .scroll-container::after {
      right: -6px;
    }

    /* 标题区域 */
    .title-section {
      text-align: center;
      margin-bottom: 28px;
      border-bottom: 2px dashed #aa8e72;
      padding-bottom: 12px;
    }

    .title-section h1 {
      font-size: 2.6rem;
      font-weight: 400;
      letter-spacing: 8px;
      color: #2d4a3b;
      text-shadow: 2px 2px 0 #d0b690, 4px 4px 0 rgba(0, 0, 0, 0.1);
      margin-bottom: 4px;
      font-family: '华文楷体', 'KaiTi', cursive;
    }

    .title-section p {
      font-size: 1.2rem;
      color: #5b4b38;
      font-style: italic;
    }

    /* 纪念对象卡片 —— 可替换为你想要纪念的人 (零成本自定义) */
    .memorial-card {
      background: #f9f1e2;
      border: 2px solid #c7ad8b;
      border-radius: 60px 60px 40px 40px;
      padding: 22px 18px 18px 18px;
      margin-bottom: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 8px 0 #9f8770, inset 0 2px 10px #fffbe6;
    }

    .memorial-card .name {
      font-size: 2.8rem;
      font-weight: 500;
      line-height: 1.2;
      color: #1f3b30;
      border-bottom: 2px dotted #bb9d7e;
      padding-bottom: 6px;
      margin-bottom: 8px;
    }

    .memorial-card .relation {
      font-size: 1.3rem;
      color: #6d4f36;
      background: #e5d6c0;
      border-radius: 40px;
      padding: 6px 24px;
      box-shadow: inset 0 1px 5px #bb9b7b;
    }

    .memorial-card .dates {
      font-size: 1.2rem;
      margin-top: 12px;
      color: #4a3a28;
    }

    /* 互动仪式区： 献花/点烛 零成本但有心 */
    .ritual-board {
      display: flex;
      justify-content: space-around;
      gap: 20px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .ritual-item {
      background: #e1cfb5;
      border-radius: 64px;
      padding: 18px 24px;
      min-width: 140px;
      text-align: center;
      cursor: pointer;
      border: 3px solid #ab8b6b;
      box-shadow: 0 7px 0 #7f654b, 0 8px 12px rgba(0, 0, 0, 0.2);
      transition: 0.1s linear;
      user-select: none;
    }

    .ritual-item:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #7f654b, 0 5px 10px rgba(0, 0, 0, 0.2);
    }

    .ritual-emoji {
      font-size: 3.5rem;
      line-height: 1.2;
      filter: drop-shadow(2px 4px 4px #67533e);
    }

    .ritual-label {
      font-size: 1.5rem;
      font-weight: 500;
      color: #2f402e;
      letter-spacing: 2px;
    }

    .ritual-count {
      font-size: 1.8rem;
      font-weight: bold;
      background: #352d1e80;
      border-radius: 50px;
      padding: 4px 16px;
      margin-top: 6px;
      color: #2f261a;
      border: 1px solid #c9a47e;
    }

    /* 心语/留言板 (完全免费，用文字寄思念) */
    .message-area {
      background: #f2e5d2;
      border: 3px solid #b29678;
      padding: 24px 20px 20px;
      border-radius: 30px 30px 50px 50px;
      margin-bottom: 24px;
      box-shadow: inset 0 0 0 2px #faf1e2, 0 6px 0 #927f66;
    }

    .message-area h3 {
      font-size: 2rem;
      color: #2c4d39;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 10px solid #778a6d;
      padding-left: 20px;
      margin-bottom: 20px;
    }

    .message-input-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    #messageInput {
      flex: 1 1 250px;
      background: #fef9ea;
      border: 3px solid #ad8f6c;
      border-radius: 50px;
      padding: 16px 22px;
      font-size: 1.2rem;
      color: #2b3d29;
      outline: none;
      font-family: '华文楷体', 'KaiTi', 'Segoe UI', sans-serif;
      box-shadow: inset 0 2px 8px #b99e7e;
    }

    #messageInput::placeholder {
      color: #958063;
      font-style: italic;
      opacity: 0.8;
    }

    /* 新增：署名输入样式（与 messageInput 类似但宽度更小） */
    #messageSender {
      background: #fef9ea;
      border: 3px solid #ad8f6c;
      border-radius: 50px;
      padding: 12px 16px;
      font-size: 1.1rem;
      color: #2b3d29;
      outline: none;
      font-family: '华文楷体', 'KaiTi', 'Segoe UI', sans-serif;
      box-shadow: inset 0 2px 8px #b99e7e;
      width: 160px;
    }

    .send-btn {
      background: #7fa386;
      border: none;
      border-radius: 60px;
      padding: 0 40px;
      font-size: 1.7rem;
      font-weight: bold;
      color: #ecf3e5;
      border-bottom: 6px solid #446644;
      cursor: pointer;
      transition: 0.07s linear;
      box-shadow: 0 4px 8px #334e33;
      font-family: inherit;
      letter-spacing: 2px;
    }

    .send-btn:active {
      transform: translateY(5px);
      border-bottom-width: 2px;
    }

    /* 留言展示墙 */
    .messages-wall {
      background: #ddcfb8;
      border-radius: 24px;
      padding: 24px 18px 18px;
      border: 2px dashed #7a9e7a;
      max-height: 250px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #7b8f70 #e2d2ba;
    }

    .messages-wall::-webkit-scrollbar {
      width: 10px;
    }

    .messages-wall::-webkit-scrollbar-thumb {
      background: #7b8f70;
      border-radius: 20px;
      border: 2px solid #dac29c;
    }

    .message-bubble {
      background: #fcf6e7;
      border-radius: 30px 30px 30px 10px;
      padding: 14px 22px;
      margin-bottom: 16px;
      border: 2px solid #b1a177;
      box-shadow: 4px 5px 0 #887e62;
      font-size: 1.25rem;
      color: #2c3e2a;
      word-break: break-word;
      position: relative;
    }

    .message-bubble span {
      font-size: 1rem;
      color: #765e42;
      display: block;
      margin-top: 6px;
      text-align: right;
      font-style: italic;
    }

    /* 底部氛围 */
    .footer-note {
      text-align: center;
      margin-top: 24px;
      color: #786a53;
      font-size: 1.2rem;
      border-top: 1px solid #baa788;
      padding-top: 20px;
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }

    .footer-note span {
      background: #ceba9b;
      border-radius: 30px;
      padding: 6px 22px;
      font-size: 1.2rem;
      color: #1f3326;
      box-shadow: inset 0 0 6px #fff0d3;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      color: #786a53;
      font-size: 0.9rem;
    }

    /* 适配小屏 */
    @media (max-width: 500px) {
      .title-section h1 {
        font-size: 2rem;
        letter-spacing: 4px;
      }

      .memorial-card .name {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>
  <div class="scroll-container">
    <!-- 标题 -->
    <div class="title-section">
      <h1>清 明 追 远</h1>
      <p>✨ 一瓣心香 · 云端如一 ✨</p>
    </div>

    <!-- 纪念对象 (完全可编辑，此处为示例“先祖” — 您可以改成任何人的名字) -->
    <div class="memorial-card">
      <div class="name">👴 先祖 · 佑后人 👵</div>
      <div class="relation">历代祖先</div>
      <div class="dates">📜 饮水思源 · 俎豆千秋</div>
    </div>

    <!-- 仪式感互动 零成本献花/点烛 且统计数据存在内存中 -->
    <div class="ritual-board">
      <div class="ritual-item" id="flowerBtn">
        <div class="ritual-emoji">🌼</div>
        <div class="ritual-label">献花</div>
        <div class="ritual-count" id="flowerCount">0</div>
      </div>
      <div class="ritual-item" id="candleBtn">
        <div class="ritual-emoji">🕯️</div>
        <div class="ritual-label">点烛</div>
        <div class="ritual-count" id="candleCount">0</div>
      </div>
      <div class="ritual-item" id="incenseBtn">
        <div class="ritual-emoji">🙏 香</div>
        <div class="ritual-label">上香</div>
        <div class="ritual-count" id="incenseCount">0</div>
      </div>
    </div>

    <!-- 思念留言板 -->
    <div class="message-area">
      <h3>📝 追思留言 · 心语墙</h3>
      <div class="message-input-group">
        <!-- 新增：署名输入 -->
        <input type="text" id="messageSender" placeholder="署名 (可选)" maxlength="20">
        <input type="text" id="messageInput" placeholder="写下你想对先人说的话... (点击发送保存)" maxlength="60">
        <button class="send-btn" id="sendMsgBtn">寄</button>
      </div>
      <!-- 动态留言展示 -->
      <div class="messages-wall" id="messageWall">
        <div class="message-bubble">
          清明风至，思念绵长。愿安好。
          <span>—— 云端追思</span>
        </div>
        <div class="message-bubble">
          无法忘记你的笑容，依然温暖。
          <span>—— 孙女 敬上</span>
        </div>
        <!-- 新增留言将通过js动态插入到这里 -->
      </div>
    </div>

    <!-- 底部氛围文字 (可变为动态时间) -->
    <div class="footer-note">
      <span>💚 万物清明</span>
      <span>🕊️ 珍惜当下</span>
      <span id="dateDisplay"></span>
    </div>

    <footer>
      powered by <a href="https://lzj-blog.top" target="_blank" style="color: #786a53; text-decoration: none; font-weight: bold;">starfallen</a> · 2026
    </footer>
  </div>

  <script>
    (function () {
      // 初始化计数 (从0开始，完全零成本纪念)
      let flower = 0, candle = 0, incense = 0;

      // 获取显示元素
      const flowerSpan = document.getElementById('flowerCount');
      const candleSpan = document.getElementById('candleCount');
      const incenseSpan = document.getElementById('incenseCount');

      // 加载之前保存的计数（如果有）
      (function loadCounts() {
        try {
          const saved = localStorage.getItem('qingmingCounts');
          if (saved) {
            const c = JSON.parse(saved);
            flower = parseInt(c.flower || 0, 10);
            candle = parseInt(c.candle || 0, 10);
            incense = parseInt(c.incense || 0, 10);
          }
        } catch (e) { /* ignore */ }
        flowerSpan.innerText = flower;
        candleSpan.innerText = candle;
        incenseSpan.innerText = incense;
      })();

      function saveCounts() {
        try {
          localStorage.setItem('qingmingCounts', JSON.stringify({ flower, candle, incense }));
        } catch (e) { /* ignore */ }
      }

      // 按钮绑定
      document.getElementById('flowerBtn').addEventListener('click', function () {
        flower++;
        flowerSpan.innerText = flower;
        saveCounts();
        // 可附加轻微动画感 (无需实际效果，只是反馈)
      });

      document.getElementById('candleBtn').addEventListener('click', function () {
        candle++;
        candleSpan.innerText = candle;
        saveCounts();
      });

      document.getElementById('incenseBtn').addEventListener('click', function () {
        incense++;
        incenseSpan.innerText = incense;
        saveCounts();
      });

      // ---------- 留言板功能 (纯前端存储，刷新页面不影响，属于临时纪念；如果想长期可自行保存，但零成本我们就在内存) ----------
      const messageInput = document.getElementById('messageInput');
      const messageSender = document.getElementById('messageSender');
      const sendBtn = document.getElementById('sendMsgBtn');
      const messageWall = document.getElementById('messageWall');

      // 从 localStorage 加载历史留言（可选，但为了零成本不依赖后端，且保留刷新前数据，这样更贴心）
      function loadMessages() {
        const saved = localStorage.getItem('qingmingMessages');
        if (saved) {
          try {
            const messages = JSON.parse(saved);
            // 清空示例消息，但保留至少两条示例作氛围? 为了整洁我们只保留加载的消息，如果想保留示例可以合并。
            // 但为了尊重用户隐私一般让用户自己决定，这里我们加载保存的，并清除原有的两条示例
            messageWall.innerHTML = '';
            if (messages.length === 0) {
              // 如果没有消息，放两条默认示例更有氛围
              messageWall.innerHTML = `
                            <div class="message-bubble">清明风至，思念绵长。愿安好。<span>—— 云端追思</span></div>
                            <div class="message-bubble">无法忘记你的笑容，依然温暖。<span>—— 孙女 敬上</span></div>
                        `;
            } else {
              messages.forEach(msg => {
                addMessageToWall(msg.text, msg.sender || '访客', false); // false表示不再次保存
              });
            }
          } catch (e) { }
        } else {
          // 默认已经有两个示例在html里了，无需重复添加，但可能已经存在，为了避免重复，如果没有任何保存，我们保留现有html里的示例
          // 为了结构统一，检查messageWall的子节点数量，如果只有0或者很少，补默认。但现有html已经有两条，就不动。
          // 但以防万一，我们保留，如果墙内没有子节点就补。
        }
      }

      // 添加一条留言到页面 (参数: 文本, 发送人, 是否要保存到localStorage)
      function addMessageToWall(text, sender = '访客', needSave = true) {
        if (!text.trim()) return;
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        // 简单转义防止XSS，但这是静态纪念页面，可信任
        const safeText = text.replace(/[&<>"]/g, function (m) {
          if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; if (m === '"') return '&quot;';
          return m;
        });
        const timeStr = new Date().toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit' });
        bubble.innerHTML = `${safeText}<span>—— ${sender} · ${timeStr}</span>`;
        messageWall.appendChild(bubble);
        // 滚动到底部
        messageWall.scrollTop = messageWall.scrollHeight;

        if (needSave) {
          saveMessagesToStorage();
        }
      }

      // 保存所有留言到 localStorage (轻量，零成本保留)
      function saveMessagesToStorage() {
        const bubbles = messageWall.querySelectorAll('.message-bubble');
        const messages = [];
        bubbles.forEach(b => {
          // 提取纯文本内容 (去掉末尾的span中的内容)
          const cloneB = b.cloneNode(true);
          const span = cloneB.querySelector('span');
          if (span) span.remove(); // 移除署名部分，只保留正文
          let text = cloneB.textContent.trim();
          // 提取发送人及时间
          const senderSpan = b.querySelector('span');
          let sender = '访客';
          if (senderSpan) {
            const raw = senderSpan.textContent;
            const match = raw.replace('——', '').trim();
            sender = match.split('·')[0].trim() || '访客';
          }
          messages.push({ text: text, sender: sender });
        });
        localStorage.setItem('qingmingMessages', JSON.stringify(messages));
      }

      // 发送留言
      function sendMessage() {
        const msg = messageInput.value.trim();
        if (msg === '') {
          alert('请写下你想说的话～');
          return;
        }
        // 使用署名输入（可选），若为空则默认“访客”
        const senderName = (messageSender && messageSender.value.trim()) ? messageSender.value.trim() : '访客';
        addMessageToWall(msg, senderName, true);
        messageInput.value = ''; // 清空
        if (messageSender) messageSender.value = '';
      }

      sendBtn.addEventListener('click', sendMessage);
      messageInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          sendMessage();
        }
      });

      // 日期显示底部 (今天清明氛围)
      function updateDate() {
        const d = new Date();
        const year = d.getFullYear();
        const month = (d.getMonth() + 1).toString().padStart(2, '0');
        const day = d.getDate().toString().padStart(2, '0');
        document.getElementById('dateDisplay').innerText = `${year}.${month}.${day}  `;
      }
      updateDate();

      // 加载留言 (并且每次初始化时如果有localstorage数据就使用，否则保留html原有两条)
      // 但我们需要确保原有的两条示例不丢失？ 调用loadMessages会清空并加载localstorage或默认。所以我们先保留。
      // 但html里有两条，如果localstorage有数据，我们会在loadMessages里清空并加载，完美。如果localstorage没有，则填充默认两条。
      // 注意：为了防止每次刷新都重复增加默认，我们判断如果没有任何保存，且当前墙内没有子节点(极少情况)，则添加默认。
      // 更稳健做法：
      const existingMsgs = localStorage.getItem('qingmingMessages');
      if (!existingMsgs) {
        // 无存储，保留原有两条（已经在html里），但是需要让以后保存时能包含它们，所以我们要把现有的两条也同步存入storage。
        // 初次访问时，将html内置留言存入localStorage（否则若用户添加新留言，只会保存新留言而丢失内置留言，违背初衷）
        // 我们在这里手动把现有两条加入到storage中（如果storage为空）
        const initMessages = [];
        const initBubbles = messageWall.querySelectorAll('.message-bubble');
        initBubbles.forEach(b => {
          const cloneB = b.cloneNode(true);
          const span = cloneB.querySelector('span');
          if (span) span.remove();
          let text = cloneB.textContent.trim();
          const senderSpan = b.querySelector('span');
          let sender = '访客';
          if (senderSpan) {
            const raw = senderSpan.textContent;
            sender = raw.replace('——', '').split('·')[0].trim() || '访客';
          }
          initMessages.push({ text, sender });
        });
        localStorage.setItem('qingmingMessages', JSON.stringify(initMessages));
      } else {
        // 有存储，清空wall并加载存储数据
        messageWall.innerHTML = '';
        const messages = JSON.parse(existingMsgs);
        if (messages.length === 0) {
          // 如果存储为空数组，也放默认示例
          messageWall.innerHTML = `
                    <div class="message-bubble">清明风至，思念绵长。愿安好。<span>—— 云端追思</span></div>
                    <div class="message-bubble">无法忘记你的笑容，依然温暖。<span>—— 孙女 敬上</span></div>
                `;
          // 并再次存入默认
          const defaultMsgs = [
            { text: '清明风至，思念绵长。愿安好。', sender: '云端追思' },
            { text: '无法忘记你的笑容，依然温暖。', sender: '孙女 敬上' }
          ];
          localStorage.setItem('qingmingMessages', JSON.stringify(defaultMsgs));
        } else {
          messages.forEach(msg => {
            addMessageToWall(msg.text, msg.sender, false); // 避免循环保存
          });
        }
      }

      // 最后确保任何留言新增/删除时更新storage (留言新增已经通过addMessageToWall里needSave调用了saveMessagesToStorage)
      // 但删除留言? 本方案没有删除功能，但也可以扩展。为了简单，仅此。
      // 额外：如果想清零计数，可以刷新页面，但纪念无需清零。
    })();/*  */
  </script>
</body>

</html>
